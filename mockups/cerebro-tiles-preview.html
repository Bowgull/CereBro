<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CereBro — generated tiles preview</title>
<style>
  :root {
    --bg: #07090d;
    --surface: #181f2a;
    --raised: #202a38;
    --border: #33415540;
    --ink: #f4efe3;
    --ink-2: #b8c0cc;
    --ink-3: #7e8898;
    --gold: #d9b56a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 32px;
  }
  h1 { color: var(--gold); font-size: 16px; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase; }
  .subtitle { color: var(--ink-3); margin-bottom: 32px; }

  section { margin-bottom: 40px; }
  h2 { color: var(--ink-2); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

  .tile-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .tile-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-width: 80px;
  }
  .tile-card img {
    image-rendering: pixelated;
    width: 64px;
    height: 64px;
  }
  .tile-label {
    color: var(--ink-3);
    font-size: 11px;
  }

  .sheet-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    display: inline-block;
    margin-bottom: 12px;
  }
  .sheet-wrap img {
    image-rendering: pixelated;
    display: block;
  }
  .scale-row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .scale-label { color: var(--ink-3); font-size: 11px; margin-top: 6px; text-align: center; }

  .prop-grid { display: flex; gap: 16px; flex-wrap: wrap; }
  .prop-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .prop-card img { image-rendering: pixelated; }
  .prop-label { color: var(--ink-3); font-size: 11px; }

  .checker {
    background-image:
      linear-gradient(45deg, #222 25%, transparent 25%),
      linear-gradient(-45deg, #222 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #222 75%),
      linear-gradient(-45deg, transparent 75%, #222 75%);
    background-size: 8px 8px;
    background-position: 0 0, 0 4px, 4px -4px, -4px 0px;
    background-color: #111;
  }
</style>
</head>
<body>

<h1>CereBro — Generated Sprites</h1>
<p class="subtitle">PixelLab output — 2026-05-05</p>

<section>
  <h2>Tileset — 16 tiles (32×32 each)</h2>
  <div class="tile-grid" id="tiles"></div>
</section>

<section>
  <h2>Sheet (composite)</h2>
  <div class="scale-row">
    <div>
      <div class="sheet-wrap checker">
        <img src="/app/client/public/sprites/cerebro/tileset/sheet.png" id="sheet-1x" alt="sheet" />
      </div>
      <div class="scale-label">1×</div>
    </div>
    <div>
      <div class="sheet-wrap checker">
        <img src="/app/client/public/sprites/cerebro/tileset/sheet.png" id="sheet-4x" style="width:auto;height:auto" alt="sheet 4x" />
      </div>
      <div class="scale-label">4×</div>
    </div>
  </div>
</section>

<section>
  <h2>Agent Sprites — PixelLab (11 characters × 4 directions)</h2>
  <div id="agents-pixellab"></div>
</section>

<section style="opacity:0.4">
  <h2>Kenney Composites (placeholders — superseded)</h2>
  <div class="prop-grid" id="agents"></div>
</section>

<section>
  <h2>Hub + Props</h2>
  <div class="prop-grid">
    <div class="prop-card checker">
      <img src="/app/client/public/sprites/cerebro/hub/v1.png" style="image-rendering:pixelated;width:128px;height:auto" alt="hub v1" />
      <span class="prop-label">hub/v1.png</span>
    </div>
    <div class="prop-card checker">
      <img src="/app/client/public/sprites/cerebro/props/tony_forge.png" style="image-rendering:pixelated;width:128px;height:auto" alt="tony forge" />
      <span class="prop-label">props/tony_forge.png</span>
    </div>
  </div>
</section>

<script>
const grid = document.getElementById('tiles');
for (let i = 0; i < 16; i++) {
  const card = document.createElement('div');
  card.className = 'tile-card checker';
  card.innerHTML = `
    <img src="/app/client/public/sprites/cerebro/tileset/tile_${i}.png" alt="tile ${i}" />
    <span class="tile-label">tile_${i}</span>
  `;
  grid.appendChild(card);
}

// PixelLab characters — 4 directions each
const pixellabAgents = ['cortana','tony','gojo','surfer','silver_horse','c3po','aang','batman','oak','spock','piccolo'];
const pixellabGrid = document.getElementById('agents-pixellab');
pixellabAgents.forEach(name => {
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;gap:16px;margin-bottom:14px;padding:12px;background:var(--surface);border:1px solid var(--border);';
  row.innerHTML = `
    <div style="width:80px;color:var(--gold);font-size:11px;text-transform:uppercase;letter-spacing:0.08em">${name}</div>
    <div style="display:flex;gap:12px">
      ${['south','east','north','west'].map(dir => `
        <div style="text-align:center">
          <div class="checker" style="padding:4px;display:inline-block">
            <img src="/app/client/public/sprites/cerebro/agents/${name}/${dir}.png" style="image-rendering:pixelated;width:128px;height:128px" alt="${name} ${dir}" />
          </div>
          <div style="color:var(--ink-3);font-size:10px;margin-top:4px">${dir}</div>
        </div>
      `).join('')}
    </div>
  `;
  pixellabGrid.appendChild(row);
});

const agents = ['cortana','tony','gojo','surfer','c3po','aang','batman','oak','spock','piccolo'];
const agentGrid = document.getElementById('agents');
agents.forEach(name => {
  const card = document.createElement('div');
  card.className = 'prop-card checker';
  card.innerHTML = `
    <img src="/mockups/assets/sprites/${name}.png" style="image-rendering:pixelated;width:64px;height:auto" alt="${name}" />
    <span class="prop-label">${name}</span>
  `;
  agentGrid.appendChild(card);
});

// Scale sheet 4x
const sheet4x = document.getElementById('sheet-4x');
sheet4x.onload = () => {
  sheet4x.style.width = (sheet4x.naturalWidth * 4) + 'px';
  sheet4x.style.height = (sheet4x.naturalHeight * 4) + 'px';
};
if (sheet4x.complete) sheet4x.dispatchEvent(new Event('load'));
</script>
</body>
</html>
