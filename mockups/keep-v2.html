<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CereBro — The Keep</title>
<style>
  :root {
    --bg: #0E1116;
    --bg-soft: #131821;
    --surface: #181F2A;
    --surface-raised: #202A38;
    --surface-muted: #151A23;
    --border: #334155;
    --border-soft: #253041;
    --text: #F4EFE3;
    --text-2: #B8C0CC;
    --text-mute: #7E8898;
    --accent: #6BA6FF;
    --accent-soft: #2D5B8F;
    --violet: #8B5CF6;
    --violet-glow: #A78BFA;
    --success: #9FD2B7;
    --warning: #F6C177;
    --danger: #EF6F6C;
    --gold: #D9B56A;
    --gold-d: #8a6f2c;
    --stone: #6B7280;
    --torch: #ffb24a;

    --stone-1: #4a4a55;
    --stone-2: #3a3a44;
    --stone-3: #2c2c34;
    --stone-4: #20202a;
    --mortar: #16161c;
    --floor-1: #6b5a48;
    --floor-2: #574838;
    --floor-3: #3f3326;
    --wood-1: #6a4a30;
    --wood-2: #4a3220;

    --mono: ui-monospace, "JetBrains Mono", Menlo, monospace;
    --pixel: "VT323", "Press Start 2P", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    overflow: hidden;
    image-rendering: pixelated;
  }
  svg { image-rendering: pixelated; shape-rendering: crispEdges; display: block; }

  .app { position: relative; height: 100vh; width: 100vw; overflow: hidden; }

  /* ============ EXTERIOR (establishing shot) ============ */
  .exterior {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 30%, #2a2540 0%, transparent 55%),
      linear-gradient(180deg, #0a0a18 0%, #1a1a2a 35%, #2a2540 60%, #1a1a22 100%);
    z-index: 100;
    transition: opacity 1.2s, transform 1.2s;
  }
  .exterior.hidden { opacity: 0; pointer-events: none; transform: scale(1.05); }

  .ext-stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 15%, var(--text) 50%, transparent 100%),
      radial-gradient(1px 1px at 60% 22%, var(--gold) 50%, transparent 100%),
      radial-gradient(1px 1px at 35% 8%, var(--text) 50%, transparent 100%),
      radial-gradient(1px 1px at 80% 12%, var(--text) 50%, transparent 100%),
      radial-gradient(1px 1px at 15% 30%, var(--accent) 50%, transparent 100%),
      radial-gradient(1px 1px at 90% 35%, var(--text) 50%, transparent 100%),
      radial-gradient(1px 1px at 45% 18%, var(--text) 50%, transparent 100%);
    background-size: 100% 100%;
    background-repeat: no-repeat;
    opacity: 0.8;
  }
  .ext-moon {
    position: absolute; top: 8%; right: 14%;
    width: 80px; height: 80px;
    background: radial-gradient(circle at 35% 35%, #f0e8c8 0%, #c8b89a 60%, transparent 100%);
    border-radius: 50%;
    box-shadow: 0 0 40px 10px rgba(240, 232, 200, 0.3);
  }
  .ext-mountains {
    position: absolute; bottom: 18%; left: 0; right: 0;
    height: 30%;
    background:
      linear-gradient(180deg, transparent 0%, #1a1820 100%),
      repeating-linear-gradient(90deg, transparent 0 60px, rgba(0,0,0,0.3) 60px 62px);
    clip-path: polygon(0% 50%, 8% 30%, 16% 60%, 24% 25%, 35% 55%, 46% 20%, 58% 50%, 68% 30%, 80% 55%, 90% 35%, 100% 60%, 100% 100%, 0% 100%);
  }
  .ext-ground {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 18%;
    background: linear-gradient(180deg, #1a1418 0%, #0a0808 100%);
  }

  .castle-sil {
    position: absolute;
    bottom: 14%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 280px;
  }
  .castle-sil svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 30px rgba(217, 181, 106, 0.15));
  }
  /* flicker windows */
  .castle-sil .win {
    animation: winflicker 3s ease-in-out infinite;
  }
  @keyframes winflicker {
    0%, 100% { opacity: 0.9; }
    50% { opacity: 1; }
  }

  .ext-title {
    position: absolute;
    bottom: 28%;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--pixel);
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 8px;
    text-shadow: 0 0 20px rgba(217, 181, 106, 0.4);
    opacity: 0;
    animation: fadeUp 1.6s 0.4s forwards;
  }
  .ext-sub {
    position: absolute;
    bottom: 24%;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--pixel);
    font-size: 11px;
    color: var(--text-2);
    letter-spacing: 3px;
    opacity: 0;
    animation: fadeUp 1.6s 0.9s forwards;
  }
  .ext-enter {
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--pixel);
    font-size: 14px;
    color: var(--bg);
    background: var(--gold);
    padding: 12px 32px;
    letter-spacing: 4px;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 24px rgba(217, 181, 106, 0.4);
    opacity: 0;
    animation: fadeUp 1.6s 1.4s forwards, btnpulse 2.4s 3s infinite;
  }
  .ext-enter:hover { background: var(--text); transform: translateX(-50%) scale(1.05); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes btnpulse {
    0%, 100% { box-shadow: 0 0 24px rgba(217,181,106,0.4); }
    50%      { box-shadow: 0 0 36px rgba(217,181,106,0.7); }
  }

  /* ============ INTERIOR ============ */
  .interior {
    position: absolute; inset: 0;
    display: grid;
    grid-template-rows: auto 1fr auto;
    opacity: 0;
    transition: opacity 1.2s 0.4s;
  }
  .interior.shown { opacity: 1; }

  /* ===== TOP BAR (minimal) ===== */
  .topbar {
    background: var(--bg);
    border-bottom: 1px solid var(--gold-d);
    padding: 10px 20px;
    display: flex; align-items: center; gap: 16px;
    font-family: var(--pixel);
    font-size: 13px;
    z-index: 10;
  }
  .topbar .brand {
    color: var(--gold);
    font-size: 16px;
    letter-spacing: 2px;
  }
  .topbar .project {
    color: var(--text-2);
    font-size: 11px;
    margin-right: auto;
  }
  .topbar .project b { color: var(--accent); }
  .topbar .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mute);
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .topbar .icon-btn:hover { border-color: var(--gold); color: var(--gold); }
  .topbar .icon-btn .dot {
    position: absolute; top: -4px; right: -4px;
    width: 8px; height: 8px;
    background: var(--warning);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--warning);
  }
  .topbar .icon-btn { position: relative; }

  /* ===== STAGE (the castle) ===== */
  .stage {
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 50% 50%, #1a1f2a 0%, var(--bg) 80%);
  }

  /* ===== FLOOR SELECTOR ===== */
  .floors {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column;
    gap: 8px;
    z-index: 5;
  }
  .floors button {
    width: 44px; height: 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-mute);
    font-family: var(--pixel);
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .floors button:hover { border-color: var(--gold); color: var(--gold); }
  .floors button.active {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(217,181,106,0.4);
  }
  .floors button .lbl {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 8px;
  }

  /* ===== ISO SCENE ===== */
  .scene {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.6s;
    pointer-events: none;
  }
  .scene.active { opacity: 1; pointer-events: auto; }

  .iso {
    position: relative;
    width: 900px;
    height: 600px;
    transform-style: preserve-3d;
  }

  /* tiles rendered as diamonds */
  .tile {
    position: absolute;
    width: 64px; height: 32px;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .tile svg { width: 64px; height: 32px; }

  /* room area (collection of tiles) */
  .room-area {
    position: absolute;
    transform: translate(-50%, -50%);
    pointer-events: auto;
    cursor: pointer;
  }
  .room-area .floor-tile {
    width: 64px; height: 32px;
    position: absolute;
    transform: translate(-50%, -50%);
  }
  .room-label {
    position: absolute;
    transform: translate(-50%, -150%);
    font-family: var(--pixel);
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1.5px;
    text-shadow: 0 0 6px rgba(0,0,0,0.9);
    white-space: nowrap;
    z-index: 8;
    pointer-events: none;
  }
  .room-label small {
    display: block;
    font-size: 9px;
    color: var(--text-mute);
    letter-spacing: 1px;
  }

  /* walls — flat diamond top + vertical face for visibility */
  .wall {
    position: absolute;
    transform: translate(-50%, -100%);
    pointer-events: none;
  }

  /* decorations */
  .deco {
    position: absolute;
    transform: translate(-50%, -100%);
    pointer-events: none;
    z-index: 4;
  }

  /* THE ORB */
  .orb {
    position: absolute;
    transform: translate(-50%, -100%);
    width: 56px; height: 80px;
    z-index: 7;
    pointer-events: none;
  }
  .orb .ped {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 28px; height: 14px;
    background: linear-gradient(180deg, var(--stone-1), var(--stone-3));
    border-radius: 4px 4px 8px 8px;
  }
  .orb .ball {
    position: absolute;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    width: 30px; height: 30px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff 0%, var(--gold) 30%, var(--violet) 75%, transparent 100%);
    box-shadow:
      0 0 16px 4px rgba(217,181,106,0.5),
      0 0 30px 12px rgba(167,139,250,0.4);
    animation: orbpulse 3.4s ease-in-out infinite;
  }
  .orb .glow {
    position: absolute;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(167,139,250,0.4) 0%, transparent 60%);
    animation: orbpulse 3.4s ease-in-out infinite;
  }
  @keyframes orbpulse {
    0%, 100% { opacity: 0.85; transform: translateX(-50%) scale(1); }
    50%      { opacity: 1; transform: translateX(-50%) scale(1.08); }
  }

  /* TORCHES */
  .torch {
    position: absolute;
    transform: translate(-50%, -100%);
    width: 6px; height: 14px;
    z-index: 5;
  }
  .torch::before {
    content: ''; display: block;
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    width: 10px; height: 12px;
    background: radial-gradient(ellipse at center bottom, var(--torch) 0%, #d68a30 60%, transparent 100%);
    filter: blur(0.5px);
    animation: tflicker 1.4s ease-in-out infinite;
  }
  .torch::after {
    content: ''; display: block;
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 4px; height: 6px;
    background: var(--wood-2);
  }
  @keyframes tflicker {
    0%, 100% { opacity: 0.85; transform: translateX(-50%) scale(1); }
    50%      { opacity: 1; transform: translateX(-50%) scale(1.15); }
  }

  /* AGENT SPRITE */
  .agent {
    position: absolute;
    transform: translate(-50%, -100%);
    width: 44px; height: 64px;
    z-index: 10;
    transition: left 1.6s linear, top 1.6s linear;
    pointer-events: auto;
    cursor: pointer;
  }
  .agent:hover { filter: brightness(1.2); }
  .agent .sprite {
    position: relative;
    width: 44px; height: 64px;
  }
  .agent .sprite svg {
    position: absolute; top: 0; left: 0;
    width: 44px; height: 64px;
  }
  .agent .sprite svg.fb { animation: frameA 0.5s steps(1) infinite; }
  .agent .sprite svg.fc { animation: frameB 0.5s steps(1) infinite; }
  @keyframes frameA { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  @keyframes frameB { 0%,49% { opacity: 0; } 50%,100% { opacity: 1; } }
  .agent.idle .sprite svg.fc { animation: none; opacity: 0; }
  .agent.idle .sprite svg.fb { animation: idlebob 2.4s ease-in-out infinite; }
  @keyframes idlebob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  .agent .name {
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--pixel);
    font-size: 9px;
    color: var(--text);
    letter-spacing: 1px;
    text-shadow: 0 0 4px var(--bg), 0 0 4px var(--bg);
    white-space: nowrap;
  }
  .agent .shadow {
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 28px; height: 8px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.6) 0%, transparent 70%);
    z-index: -1;
  }

  .agent .bubble {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface-raised);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    font-size: 10px;
    border-radius: 4px;
    white-space: nowrap;
    z-index: 11;
    pointer-events: none;
  }
  .agent .bubble.live    { border-color: var(--accent);  color: var(--accent); }
  .agent .bubble.warn    { border-color: var(--warning); color: var(--warning); }
  .agent .bubble.violet  { border-color: var(--violet);  color: var(--violet-glow); }
  .agent .bubble.success { border-color: var(--success); color: var(--success); }
  .agent .bubble::after {
    content: '';
    position: absolute;
    bottom: -5px; left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 6px; height: 6px;
    background: var(--surface-raised);
    border-right: 1px solid; border-bottom: 1px solid;
    border-color: inherit;
  }

  /* ===== BOTTOM BAR ===== */
  .bottom {
    background: var(--bg);
    border-top: 1px solid var(--border-soft);
    padding: 10px 20px;
    display: flex; align-items: center; gap: 16px;
    z-index: 10;
  }
  .intent-input {
    flex: 1;
    display: flex; align-items: center; gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 10px;
  }
  .intent-input:focus-within { border-color: var(--accent); }
  .intent-input .who {
    font-family: var(--pixel);
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 1px;
    border-right: 1px solid var(--border);
    padding-right: 10px;
  }
  .intent-input input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    outline: none;
    font-family: var(--mono);
    font-size: 12px;
  }
  .intent-input button {
    background: var(--gold);
    color: var(--bg);
    border: none;
    padding: 4px 14px;
    font-family: var(--pixel);
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .intent-input button:hover { background: var(--text); }

  .meter {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mute);
  }
  .meter .bar {
    width: 100px; height: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .meter .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--success), var(--gold));
    transition: width 0.6s;
  }
  .meter b { color: var(--text); }

  .alert {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border: 1px solid var(--warning);
    color: var(--warning);
    font-family: var(--pixel);
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    animation: alertpulse 1.6s ease-in-out infinite;
  }
  .alert.hidden { display: none; }
  .alert::before {
    content: '!';
    font-size: 12px;
    background: var(--warning);
    color: var(--bg);
    width: 14px; height: 14px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold;
  }
  @keyframes alertpulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(246,193,119,0.5); }
    50%      { box-shadow: 0 0 0 6px rgba(246,193,119,0); }
  }

  /* ===== SLIDE-IN PANEL ===== */
  .panel {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 340px;
    background: var(--bg-soft);
    border-left: 1px solid var(--gold-d);
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    z-index: 50;
    overflow-y: auto;
    padding: 18px;
  }
  .panel.shown { transform: translateX(0); }
  .panel .close {
    position: absolute;
    top: 12px; right: 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mute);
    width: 24px; height: 24px;
    cursor: pointer;
  }
  .panel .close:hover { border-color: var(--danger); color: var(--danger); }

  .panel h2 {
    font-family: var(--pixel);
    color: var(--gold);
    font-size: 14px;
    letter-spacing: 2px;
    margin: 0 0 4px;
    font-weight: normal;
  }
  .panel .sub { color: var(--text-mute); font-size: 10px; margin-bottom: 16px; }

  .panel .stat {
    display: flex; justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px dashed var(--border-soft);
    font-size: 11px;
    color: var(--text-2);
  }
  .panel .stat b { color: var(--text); }

  .panel h3 {
    font-family: var(--pixel);
    color: var(--gold);
    font-size: 10px;
    letter-spacing: 1.5px;
    margin: 18px 0 6px;
    font-weight: normal;
    border-top: 1px solid var(--border-soft);
    padding-top: 12px;
  }

  .panel .approve-card {
    margin: 16px 0;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--warning);
    border-left: 3px solid var(--warning);
  }
  .panel .approve-card .who {
    font-family: var(--pixel);
    color: var(--warning);
    font-size: 11px;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .panel .approve-card .ask {
    color: var(--text);
    font-size: 12px;
    margin-bottom: 8px;
  }
  .panel .approve-card .meta {
    font-size: 10px;
    color: var(--text-mute);
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .panel .approve-card .meta b { color: var(--text-2); }
  .panel .approve-card .actions {
    display: flex; gap: 8px;
  }
  .panel .approve-card button {
    flex: 1;
    padding: 8px;
    font-family: var(--pixel);
    font-size: 10px;
    letter-spacing: 1px;
    border: 1px solid var(--border);
    background: var(--surface-raised);
    color: var(--text);
    cursor: pointer;
  }
  .panel .approve-card button.ok {
    border-color: var(--success);
    color: var(--success);
  }
  .panel .approve-card button.ok:hover { background: var(--success); color: var(--bg); }
  .panel .approve-card button.no {
    border-color: var(--danger);
    color: var(--danger);
  }
  .panel .approve-card button.no:hover { background: var(--danger); color: var(--bg); }

  .panel .row {
    display: flex; justify-content: space-between;
    font-size: 11px;
    padding: 4px 0;
    color: var(--text-2);
  }
  .panel .badge {
    font-size: 9px;
    padding: 1px 6px;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .panel .badge.warn { color: var(--warning); border-color: var(--warning); }
  .panel .badge.violet { color: var(--violet-glow); border-color: var(--violet); }
  .panel .badge.success { color: var(--success); border-color: var(--success); }

  /* ===== LEFT ICON RAIL (collapsed) ===== */
  .iconrail {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column;
    gap: 6px;
    z-index: 5;
  }
  .iconrail button {
    width: 36px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-mute);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .iconrail button:hover { border-color: var(--gold); color: var(--gold); }
  .iconrail button .dot {
    position: absolute; top: 4px; right: 4px;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }
  .iconrail button { position: relative; }

</style>

<body>

<div class="app">

  <!-- ===== EXTERIOR ESTABLISHING SHOT ===== -->
  <div class="exterior" id="exterior">
    <div class="ext-stars"></div>
    <div class="ext-moon"></div>
    <div class="ext-mountains"></div>
    <div class="ext-ground"></div>

    <div class="castle-sil">
      <svg viewBox="0 0 600 280" preserveAspectRatio="xMidYMid meet">
        <!-- main keep -->
        <rect x="180" y="100" width="240" height="160" fill="#1a1820"/>
        <rect x="180" y="100" width="240" height="160" fill="url(#stone)" opacity="0.3"/>

        <rect x="180" y="92" width="20" height="8" fill="#1a1820"/>
        <rect x="220" y="92" width="20" height="8" fill="#1a1820"/>
        <rect x="260" y="92" width="20" height="8" fill="#1a1820"/>
        <rect x="300" y="92" width="20" height="8" fill="#1a1820"/>
        <rect x="340" y="92" width="20" height="8" fill="#1a1820"/>
        <rect x="380" y="92" width="20" height="8" fill="#1a1820"/>
        <!-- left tower -->
        <rect x="120" y="60" width="60" height="200" fill="#1a1820"/>
        <polygon points="120,60 150,30 180,60" fill="#2a2030"/>
        <rect x="120" y="52" width="10" height="8" fill="#1a1820"/>
        <rect x="140" y="52" width="10" height="8" fill="#1a1820"/>
        <rect x="160" y="52" width="10" height="8" fill="#1a1820"/>
        <!-- right tower (taller, observatory) -->
        <rect x="420" y="40" width="60" height="220" fill="#1a1820"/>
        <polygon points="420,40 450,8 480,40" fill="#2a2030"/>
        <rect x="420" y="32" width="10" height="8" fill="#1a1820"/>
        <rect x="440" y="32" width="10" height="8" fill="#1a1820"/>
        <rect x="460" y="32" width="10" height="8" fill="#1a1820"/>
        <!-- center peak -->
        <polygon points="180,100 300,40 420,100" fill="#2a2030"/>
        <!-- glowing windows -->
        <rect class="win" x="200" y="130" width="14" height="20" fill="#ffb24a" opacity="0.85"/>
        <rect class="win" x="240" y="130" width="14" height="20" fill="#ffb24a" opacity="0.85" style="animation-delay:0.4s"/>
        <rect class="win" x="280" y="130" width="14" height="20" fill="#A78BFA" opacity="0.85" style="animation-delay:0.8s"/>
        <rect class="win" x="320" y="130" width="14" height="20" fill="#ffb24a" opacity="0.85" style="animation-delay:1.2s"/>
        <rect class="win" x="360" y="130" width="14" height="20" fill="#6BA6FF" opacity="0.85" style="animation-delay:0.6s"/>
        <rect class="win" x="200" y="180" width="14" height="20" fill="#ffb24a" opacity="0.7" style="animation-delay:0.3s"/>
        <rect class="win" x="280" y="180" width="14" height="20" fill="#D9B56A" opacity="0.85" style="animation-delay:0.9s"/>
        <rect class="win" x="360" y="180" width="14" height="20" fill="#ffb24a" opacity="0.7" style="animation-delay:1.5s"/>

        <rect class="win" x="138" y="100" width="10" height="14" fill="#ffb24a" opacity="0.85"/>
        <rect class="win" x="138" y="140" width="10" height="14" fill="#ffb24a" opacity="0.85" style="animation-delay:0.7s"/>

        <rect class="win" x="438" y="120" width="10" height="14" fill="#ffb24a" opacity="0.85" style="animation-delay:0.5s"/>

        <rect class="win" x="438" y="200" width="10" height="14" fill="#A78BFA" opacity="0.85" style="animation-delay:1.4s"/>
        <!-- gate -->
        <rect x="280" y="200" width="40" height="60" fill="#0a0a10"/>
        <path d="M 280 220 Q 300 200 320 220 L 320 260 L 280 260 Z" fill="#0a0a10"/>
        <!-- flags -->
        <rect x="148" y="12" width="2" height="20" fill="#5a3820"/>
        <polygon points="150,12 168,16 150,22" fill="#D9B56A"/>
        <rect x="448" y="-8" width="2" height="20" fill="#5a3820"/>
        <polygon points="450,-8 470,-4 450,4" fill="#D9B56A"/>
        <defs>
          <pattern id="stone" patternUnits="userSpaceOnUse" width="20" height="20">
            <rect width="20" height="20" fill="#1a1820"/>
            <rect x="0" y="0" width="10" height="10" fill="#22202a" opacity="0.6"/>
            <rect x="10" y="10" width="10" height="10" fill="#22202a" opacity="0.6"/>
          </pattern>
        </defs>
      </svg>
    </div>

    <div class="ext-title">CEREBRO</div>
    <div class="ext-sub">THE KEEP · NIGHT WATCH</div>
    <button class="ext-enter" id="enterBtn">▼ ENTER ▼</button>
  </div>

  <!-- ===== INTERIOR ===== -->
  <div class="interior" id="interior">

    <!-- TOP BAR -->
    <div class="topbar">
      <span class="brand">⚜ CEREBRO</span>
      <span class="project">Project: <b>CereBro V1</b></span>
      <button class="icon-btn" title="Inbox" onclick="openPanel('inbox')">✉<span class="dot"></span></button>
      <button class="icon-btn" title="Settings" onclick="openPanel('settings')">⚙</button>
    </div>

    <!-- STAGE -->
    <div class="stage">

      <!-- Floor selector -->
      <div class="floors">
        <button data-floor="upper" title="Upper Floor"><span class="lbl">UPPER</span></button>
        <button data-floor="ground" class="active" title="Ground Floor"><span class="lbl">GROUND</span></button>
        <button data-floor="crypts" title="Crypts"><span class="lbl">CRYPTS</span></button>
      </div>

      <!-- Right icon rail -->
      <div class="iconrail">
        <button title="Tasks" onclick="openPanel('tasks')">⚐</button>
        <button title="Sources" onclick="openPanel('sources')">⌖</button>
        <button title="Memory" onclick="openPanel('memory')">◈</button>
      </div>

      <!-- ============ GROUND FLOOR ============ -->
      <div class="scene active" id="scene-ground">
        <div class="iso" id="iso-ground"></div>
      </div>

      <!-- ============ UPPER FLOOR ============ -->
      <div class="scene" id="scene-upper">
        <div class="iso" id="iso-upper"></div>
      </div>

      <!-- ============ CRYPTS ============ -->
      <div class="scene" id="scene-crypts">
        <div class="iso" id="iso-crypts"></div>
      </div>

      <!-- SLIDE-IN PANEL -->
      <div class="panel" id="panel">
        <button class="close" onclick="closePanel()">×</button>
        <div id="panelBody"></div>
      </div>

    </div>

    <!-- BOTTOM BAR -->
    <div class="bottom">
      <span class="alert hidden" id="alertChip" onclick="openApprovalPanel()">1 APPROVAL</span>
      <div class="intent-input">
        <span class="who">⌬ AANG</span>
        <input type="text" placeholder="speak — what shall the keep work on?" />
        <button>SEND</button>
      </div>
      <div class="meter">
        Tokens
        <span class="bar"><span class="fill" id="tokenFill" style="width:84%"></span></span>
        <b id="tokenLabel">84%</b>
      </div>
    </div>

  </div>
</div>

<script>
  // ====== ISO MATH ======
  const TILE_W = 64, TILE_H = 32;
  function iso(gx, gy, ox = 450, oy = 200) {
    return {
      x: ox + (gx - gy) * (TILE_W / 2),
      y: oy + (gx + gy) * (TILE_H / 2),
    };
  }

  // ====== AGENT REGISTRY ======
  const AGENTS = {
    aang:    { name: 'AANG',          role: 'intent capture',           station: 'Great Hall',         floor: 'upper',  state: 'active',     pip: '',         model: 'local · lightweight',     bubble: 'meet here',          bubClass: 'live',    home: { gx: 4, gy: 4 } },
    cortana: { name: 'CORTANA',       role: 'routing · oversight',      station: "Cortana's Hub",      floor: 'ground', state: 'active',     pip: 'violet',   model: 'local · reasoner',        bubble: 'all stations ready', bubClass: 'violet',  home: { gx: 4, gy: 4 } },
    spock:   { name: 'SPOCK',         role: 'logic · contradiction',    station: 'Observatory',        floor: 'upper',  state: 'idle',       pip: 'idle',     model: 'local · reasoner',        bubble: '',                   bubClass: '',        home: { gx: 4, gy: 1 } },
    surfer:  { name: 'SILVER SURFER', role: 'research · sources',       station: 'Cartography Hall',   floor: 'ground', state: 'active',     pip: '',         model: 'local · summary',         bubble: 'reading 3 docs',     bubClass: 'live',    home: { gx: 7, gy: 1 } },
    batman:  { name: 'BATMAN',        role: 'analysis · tradeoffs',     station: 'War Room',           floor: 'upper',  state: 'idle',       pip: 'idle',     model: 'local · reasoner',        bubble: '',                   bubClass: '',        home: { gx: 1, gy: 4 } },
    gojo:    { name: 'GOJO',          role: 'design · creative',        station: 'Atelier',            floor: 'ground', state: 'active',     pip: '',         model: 'local · reasoner',        bubble: 'drafting castle ui', bubClass: 'live',    home: { gx: 1, gy: 7 } },
    tony:    { name: 'TONY STARK',    role: 'build · code',             station: 'The Forge',          floor: 'ground', state: 'waiting',    pip: 'warn',     model: 'external · pending',      bubble: 'awaiting approval',  bubClass: 'warn',    home: { gx: 1, gy: 1 } },
    c3po:    { name: 'C-3PO',         role: 'format · output',          station: 'Scriptorium',        floor: 'ground', state: 'idle',       pip: 'idle',     model: 'local · formatter',       bubble: '',                   bubClass: '',        home: { gx: 7, gy: 7 } },
    oak:     { name: 'PROFESSOR OAK', role: 'validation · stamp',       station: "Alchemist's Tower",  floor: 'upper',  state: 'validating', pip: 'violet',   model: 'local · reasoner',        bubble: 'validating phase 0', bubClass: 'violet',  home: { gx: 7, gy: 4 } },
    piccolo: { name: 'PICCOLO',       role: 'cleanup · backups',        station: 'The Crypts',         floor: 'crypts', state: 'active',     pip: '',         model: 'rule-based',              bubble: 'pruning logs',       bubClass: 'success', home: { gx: 4, gy: 4 } },
  };

  // ====== TILE ======
  function diamondTile(color1 = '#574838', color2 = '#3f3326') {
    return `<svg viewBox="0 0 64 32" width="64" height="32">
      <polygon points="32,0 64,16 32,32 0,16" fill="${color1}" stroke="#2c2018" stroke-width="0.5"/>
      <polygon points="32,2 62,16 32,30 2,16" fill="${color2}" opacity="0.3"/>
    </svg>`;
  }
  function tileWall(color = '#3a3a44') {
    // wall as a vertical face below the diamond top
    return `<svg viewBox="0 0 64 64" width="64" height="64">
      <polygon points="32,0 64,16 64,48 32,64 0,48 0,16" fill="${color}" stroke="#1a1820" stroke-width="0.6"/>
      <polygon points="32,0 64,16 32,32 0,16" fill="#5a5a64" opacity="0.4"/>
      <line x1="0" y1="16" x2="0" y2="48" stroke="#1a1820" stroke-width="1"/>
      <line x1="64" y1="16" x2="64" y2="48" stroke="#1a1820" stroke-width="1"/>
    </svg>`;
  }
  function tileCarpet(color = '#7a3030') {
    return `<svg viewBox="0 0 64 32" width="64" height="32">
      <polygon points="32,2 62,16 32,30 2,16" fill="${color}"/>
      <polygon points="32,4 58,16 32,28 6,16" fill="#D9B56A" opacity="0.2"/>
    </svg>`;
  }

  // ====== BUILD A FLOOR ======
  function buildScene(containerId, layout, agentIds, opts = {}) {
    const c = document.getElementById(containerId);
    c.innerHTML = '';

    // Render floor tiles (rooms + courtyard)
    layout.tiles.forEach(t => {
      const p = iso(t.gx, t.gy);
      const el = document.createElement('div');
      el.className = 'tile';
      el.style.left = p.x + 'px';
      el.style.top = p.y + 'px';
      el.style.zIndex = Math.floor(p.y);
      el.innerHTML = t.carpet ? tileCarpet(t.carpet) : diamondTile(t.c1, t.c2);
      c.appendChild(el);
    });

    // Render walls
    (layout.walls || []).forEach(w => {
      const p = iso(w.gx, w.gy);
      const el = document.createElement('div');
      el.className = 'wall';
      el.style.left = p.x + 'px';
      el.style.top = p.y + 'px';
      el.style.zIndex = Math.floor(p.y);
      el.innerHTML = tileWall(w.color || '#3a3a44');
      c.appendChild(el);
    });

    // Decorations
    (layout.deco || []).forEach(d => {
      const p = iso(d.gx, d.gy);
      const el = document.createElement('div');
      el.className = 'deco';
      el.style.left = p.x + 'px';
      el.style.top = p.y + 'px';
      el.style.zIndex = Math.floor(p.y) + 1;
      el.innerHTML = d.html;
      c.appendChild(el);
    });

    // Torches
    (layout.torches || []).forEach(t => {
      const p = iso(t.gx, t.gy);
      const el = document.createElement('div');
      el.className = 'torch';
      el.style.left = p.x + 'px';
      el.style.top = (p.y - 12) + 'px';
      el.style.zIndex = Math.floor(p.y) + 2;
      c.appendChild(el);
    });

    // Room labels
    (layout.labels || []).forEach(l => {
      const p = iso(l.gx, l.gy);
      const el = document.createElement('div');
      el.className = 'room-label';
      el.style.left = p.x + 'px';
      el.style.top = p.y + 'px';
      el.style.zIndex = 100;
      el.innerHTML = l.text + (l.sub ? `<small>${l.sub}</small>` : '');
      c.appendChild(el);
    });

    // The orb (Cortana's Hub only)
    if (layout.orb) {
      const p = iso(layout.orb.gx, layout.orb.gy);
      const o = document.createElement('div');
      o.className = 'orb';
      o.style.left = p.x + 'px';
      o.style.top = p.y + 'px';
      o.style.zIndex = Math.floor(p.y);
      o.innerHTML = `<div class="glow"></div><div class="ball"></div><div class="ped"></div>`;
      c.appendChild(o);
    }

    // Agents on this floor
    agentIds.forEach(id => {
      const a = AGENTS[id];
      const sprite = makeAgent(id);
      const p = iso(a.home.gx, a.home.gy);
      sprite.dataset.gx = a.home.gx;
      sprite.dataset.gy = a.home.gy;
      sprite.dataset.homeX = a.home.gx;
      sprite.dataset.homeY = a.home.gy;
      sprite.style.left = p.x + 'px';
      sprite.style.top = p.y + 'px';
      sprite.style.zIndex = Math.floor(p.y) + 5;
      c.appendChild(sprite);
    });
  }

  function makeAgent(id) {
    const cfg = AGENTS[id];
    const a = document.createElement('div');
    a.className = 'agent walking';
    a.dataset.id = id;
    if (cfg.state === 'idle') a.classList.add('idle');

    const s = document.createElement('div');
    s.className = 'sprite';
    const tA = document.getElementById('s-' + id + '-a');
    const tB = document.getElementById('s-' + id + '-b');
    const svgA = tA.content.cloneNode(true).querySelector('svg');
    svgA.classList.add('fb');
    const svgB = tB.content.cloneNode(true).querySelector('svg');
    svgB.classList.add('fc');
    s.appendChild(svgA);
    s.appendChild(svgB);
    a.appendChild(s);

    const sh = document.createElement('div');
    sh.className = 'shadow';
    a.appendChild(sh);

    const n = document.createElement('div');
    n.className = 'name';
    n.textContent = cfg.name;
    a.appendChild(n);

    if (cfg.bubble) {
      const b = document.createElement('div');
      b.className = 'bubble ' + (cfg.bubClass || '');
      b.textContent = cfg.bubble;
      a.appendChild(b);
    }

    a.addEventListener('click', () => openAgentPanel(id));
    return a;
  }

  function moveAgent(el, gx, gy, dur = 1.6) {
    const p = iso(gx, gy);
    el.style.transition = `left ${dur}s linear, top ${dur}s linear`;
    el.style.left = p.x + 'px';
    el.style.top = p.y + 'px';
    el.style.zIndex = Math.floor(p.y) + 5;
    el.dataset.gx = gx;
    el.dataset.gy = gy;
  }

  // ====== LAYOUTS ======
  // Ground floor: 9x9 grid centered. Cortana hub center, 4 chambers in corners.
  const groundLayout = {
    tiles: [],
    walls: [],
    deco: [],
    torches: [],
    labels: [],
    orb: { gx: 4, gy: 4 },
  };

  // floor tiles for full 9x9 with stone paths
  for (let x = 0; x < 9; x++) {
    for (let y = 0; y < 9; y++) {
      const inHub = (x >= 3 && x <= 5 && y >= 3 && y <= 5);
      const isPathX = (y === 4 && (x === 2 || x === 6));
      const isPathY = (x === 4 && (y === 2 || y === 6));
      if (inHub) {
        groundLayout.tiles.push({ gx: x, gy: y, c1: '#574838', c2: '#3f3326' });
      } else if (x < 3 && y < 3) {
        groundLayout.tiles.push({ gx: x, gy: y, c1: '#4a3a2a', c2: '#3a2a1a' });
      } else if (x > 5 && y < 3) {
        groundLayout.tiles.push({ gx: x, gy: y, c1: '#3a4a3a', c2: '#2a3a2a' });
      } else if (x < 3 && y > 5) {
        groundLayout.tiles.push({ gx: x, gy: y, c1: '#4a3a4a', c2: '#3a2a3a' });
      } else if (x > 5 && y > 5) {
        groundLayout.tiles.push({ gx: x, gy: y, c1: '#4a4a3a', c2: '#3a3a2a' });
      } else {
        // courtyard / paths
        groundLayout.tiles.push({ gx: x, gy: y, c1: '#3a3328', c2: '#2a241c' });
      }
    }
  }

  // walls between rooms (selected segments only — keep doorways open)
  // top edge between Forge (NW) and Cartography (NE) — rows y=0..2, x=3 (wall to right of Forge)
  for (let y = 0; y < 3; y++) {
    if (y !== 1) groundLayout.walls.push({ gx: 3, gy: y });
    if (y !== 1) groundLayout.walls.push({ gx: 5, gy: y });
  }
  for (let y = 6; y < 9; y++) {
    if (y !== 7) groundLayout.walls.push({ gx: 3, gy: y });
    if (y !== 7) groundLayout.walls.push({ gx: 5, gy: y });
  }
  for (let x = 0; x < 3; x++) {
    if (x !== 1) groundLayout.walls.push({ gx: x, gy: 3 });
    if (x !== 1) groundLayout.walls.push({ gx: x, gy: 5 });
  }
  for (let x = 6; x < 9; x++) {
    if (x !== 7) groundLayout.walls.push({ gx: x, gy: 3 });
    if (x !== 7) groundLayout.walls.push({ gx: x, gy: 5 });
  }

  // labels
  groundLayout.labels.push({ gx: 4, gy: 4, text: '⚐ CORTANA\'S HUB', sub: 'routing · the orb' });
  groundLayout.labels.push({ gx: 1, gy: 1, text: '⚒ THE FORGE',     sub: 'tony stark' });
  groundLayout.labels.push({ gx: 7, gy: 1, text: '⌖ CARTOGRAPHY',   sub: 'silver surfer' });
  groundLayout.labels.push({ gx: 1, gy: 7, text: '✿ ATELIER',       sub: 'gojo' });
  groundLayout.labels.push({ gx: 7, gy: 7, text: '✎ SCRIPTORIUM',   sub: 'c-3po' });

  // torches at hub corners + chamber corners
  [[3,3],[5,3],[3,5],[5,5],[0,0],[2,0],[6,0],[8,0],[0,8],[2,8],[6,8],[8,8]].forEach(([x,y]) => {
    groundLayout.torches.push({ gx: x, gy: y });
  });

  // decorations per chamber
  // forge (anvil + furnace)
  groundLayout.deco.push({ gx: 1, gy: 1, html: `
    <svg viewBox="0 0 80 80" width="80" height="80">
      <rect x="20" y="40" width="40" height="20" fill="#2c2c34"/>
      <rect x="22" y="36" width="36" height="6" fill="#3a3a44"/>
      <rect x="28" y="60" width="24" height="6" fill="#2c2c34"/>

      <rect x="35" y="28" width="10" height="8" fill="#ffb24a"/>
      <rect x="38" y="32" width="4" height="4" fill="#fff0c8"/>
    </svg>
  ` });
  // cartography (large map table)
  groundLayout.deco.push({ gx: 7, gy: 1, html: `
    <svg viewBox="0 0 80 80" width="80" height="80">
      <rect x="14" y="42" width="52" height="18" fill="#5a3820"/>
      <rect x="16" y="44" width="48" height="14" fill="#c8b48a"/>

      <rect x="14" y="58" width="6" height="6" fill="#3a2418"/>
      <rect x="60" y="58" width="6" height="6" fill="#3a2418"/>
    </svg>
  ` });
  // atelier (easel)
  groundLayout.deco.push({ gx: 1, gy: 7, html: `
    <svg viewBox="0 0 80 80" width="80" height="80">
      <rect x="36" y="20" width="3" height="50" fill="#6a4a30"/>
      <rect x="22" y="24" width="32" height="32" fill="#c8b48a"/>

      <rect x="26" y="44" width="22" height="3" fill="#2D5B8F"/>

      <rect x="48" y="68" width="8" height="3" fill="#4a3220"/>
    </svg>
  ` });
  // scriptorium (writing desk)
  groundLayout.deco.push({ gx: 7, gy: 7, html: `
    <svg viewBox="0 0 80 80" width="80" height="80">
      <rect x="14" y="44" width="52" height="14" fill="#5a3820"/>
      <rect x="16" y="58" width="6" height="10" fill="#3a2418"/>
      <rect x="58" y="58" width="6" height="10" fill="#3a2418"/>
      <rect x="22" y="34" width="22" height="14" fill="#ece7dc"/>
      <rect x="24" y="38" width="18" height="1" fill="#2c2c34"/>
      <rect x="24" y="42" width="14" height="1" fill="#2c2c34"/>
      <rect x="50" y="36" width="12" height="14" fill="#ece7dc"/>
      <rect x="52" y="40" width="8" height="1" fill="#2c2c34"/>
    </svg>
  ` });
  // hub: stained glass behind orb
  groundLayout.deco.push({ gx: 4, gy: 3, html: `
    <svg viewBox="0 0 80 80" width="80" height="80">
      <rect x="28" y="20" width="24" height="36" fill="#1a1820"/>
      <rect x="30" y="22" width="20" height="32" fill="#2D5B8F" opacity="0.6"/>
      <rect x="32" y="24" width="6" height="14" fill="#A78BFA" opacity="0.7"/>
      <rect x="42" y="24" width="6" height="14" fill="#D9B56A" opacity="0.7"/>
      <rect x="32" y="40" width="6" height="12" fill="#9FD2B7" opacity="0.7"/>
      <rect x="42" y="40" width="6" height="12" fill="#EF6F6C" opacity="0.7"/>
    </svg>
  ` });

  // ===== UPPER FLOOR =====
  const upperLayout = {
    tiles: [],
    walls: [],
    deco: [],
    torches: [],
    labels: [],
  };
  for (let x = 0; x < 9; x++) {
    for (let y = 0; y < 9; y++) {
      const inHall = (x >= 3 && x <= 5 && y >= 3 && y <= 5);
      const isLeftTower = (x < 3 && y >= 3 && y <= 5);
      const isRightTower = (x > 5 && y >= 3 && y <= 5);
      const isTopTower = (x >= 3 && x <= 5 && y < 3);
      if (inHall) {
        upperLayout.tiles.push({ gx: x, gy: y, c1: '#5a4838', c2: '#3f3326' });
      } else if (isLeftTower) {
        upperLayout.tiles.push({ gx: x, gy: y, c1: '#3a3a44', c2: '#2a2a34' });
      } else if (isRightTower) {
        upperLayout.tiles.push({ gx: x, gy: y, c1: '#3a4438', c2: '#2a342a' });
      } else if (isTopTower) {
        upperLayout.tiles.push({ gx: x, gy: y, c1: '#384248', c2: '#283238' });
      }
      // outside cells stay empty (void)
    }
  }
  upperLayout.labels.push({ gx: 4, gy: 4, text: '♔ GREAT HALL', sub: 'aang' });
  upperLayout.labels.push({ gx: 1, gy: 4, text: '▼ WAR ROOM', sub: 'batman' });
  upperLayout.labels.push({ gx: 7, gy: 4, text: '⚗ ALCHEMIST\'S TOWER', sub: 'oak' });
  upperLayout.labels.push({ gx: 4, gy: 1, text: '✦ OBSERVATORY', sub: 'spock' });

  [[3,3],[5,3],[3,5],[5,5],[0,3],[0,5],[8,3],[8,5],[3,0],[5,0]].forEach(([x,y]) => {
    upperLayout.torches.push({ gx: x, gy: y });
  });

  // upper deco
  upperLayout.deco.push({ gx: 4, gy: 4, html: `
    <svg viewBox="0 0 120 60" width="120" height="60">
      <rect x="10" y="30" width="100" height="14" fill="#5a3820"/>
      <rect x="10" y="44" width="6" height="12" fill="#3a2418"/>
      <rect x="104" y="44" width="6" height="12" fill="#3a2418"/>
      <rect x="20" y="22" width="8" height="8" fill="#D9B56A"/>
      <rect x="56" y="22" width="8" height="8" fill="#6BA6FF"/>
      <rect x="92" y="22" width="8" height="8" fill="#A78BFA"/>
    </svg>
  ` });
  upperLayout.deco.push({ gx: 1, gy: 4, html: `
    <svg viewBox="0 0 80 80" width="80" height="80">
      <ellipse cx="40" cy="50" rx="32" ry="14" fill="#3a2818"/>
      <ellipse cx="40" cy="48" rx="32" ry="14" fill="#5a3820"/>
      <ellipse cx="40" cy="46" rx="30" ry="12" fill="#6a4a30"/>
      <rect x="22" y="44" width="6" height="2" fill="#EF6F6C"/>
      <rect x="38" y="42" width="6" height="2" fill="#6BA6FF"/>
      <rect x="54" y="44" width="6" height="2" fill="#D9B56A"/>
    </svg>
  ` });
  upperLayout.deco.push({ gx: 7, gy: 4, html: `
    <svg viewBox="0 0 80 80" width="80" height="80">
      <rect x="36" y="20" width="8" height="6" fill="#3a3a44"/>
      <rect x="38" y="26" width="4" height="8" fill="#3a3a44"/>
      <rect x="32" y="34" width="16" height="16" fill="#9FD2B7" opacity="0.7"/>
      <rect x="30" y="50" width="20" height="4" fill="#3a3a44"/>
      <rect x="28" y="54" width="24" height="3" fill="#1a1010"/>
    </svg>
  ` });
  upperLayout.deco.push({ gx: 4, gy: 1, html: `
    <svg viewBox="0 0 80 80" width="80" height="80">
      <rect x="38" y="14" width="4" height="14" fill="#3a3a44"/>
      <rect x="32" y="28" width="16" height="6" fill="#3a3a44"/>
      <rect x="30" y="34" width="20" height="2" fill="#5a5a64"/>
      <rect x="36" y="36" width="8" height="20" fill="#2c2c34"/>
    </svg>
  ` });

  // ===== CRYPTS =====
  const cryptsLayout = {
    tiles: [],
    walls: [],
    deco: [],
    torches: [],
    labels: [],
  };
  for (let x = 1; x < 8; x++) {
    for (let y = 1; y < 8; y++) {
      cryptsLayout.tiles.push({ gx: x, gy: y, c1: '#2a2018', c2: '#1a1810' });
    }
  }
  cryptsLayout.labels.push({ gx: 4, gy: 4, text: '⛧ THE CRYPTS', sub: 'piccolo · cleanup' });
  [[1,1],[7,1],[1,7],[7,7],[4,1],[1,4],[7,4],[4,7]].forEach(([x,y]) => {
    cryptsLayout.torches.push({ gx: x, gy: y });
  });
  // archive shelves
  cryptsLayout.deco.push({ gx: 2, gy: 2, html: `
    <svg viewBox="0 0 60 80" width="60" height="80">
      <rect x="6" y="10" width="48" height="60" fill="#2c2018"/>
      <rect x="6" y="22" width="48" height="2" fill="#3a2818"/>
      <rect x="6" y="34" width="48" height="2" fill="#3a2818"/>
      <rect x="6" y="46" width="48" height="2" fill="#3a2818"/>
      <rect x="6" y="58" width="48" height="2" fill="#3a2818"/>
      <rect x="10" y="14" width="6" height="6" fill="#5a3820"/>
      <rect x="20" y="14" width="6" height="6" fill="#5a3820"/>
      <rect x="32" y="14" width="6" height="6" fill="#5a3820"/>
      <rect x="42" y="14" width="6" height="6" fill="#5a3820"/>
      <rect x="10" y="26" width="6" height="6" fill="#5a3820"/>
      <rect x="32" y="26" width="6" height="6" fill="#5a3820"/>
      <rect x="42" y="26" width="6" height="6" fill="#5a3820"/>
      <rect x="20" y="38" width="6" height="6" fill="#5a3820"/>
      <rect x="32" y="38" width="6" height="6" fill="#5a3820"/>
    </svg>
  ` });
  cryptsLayout.deco.push({ gx: 6, gy: 6, html: `
    <svg viewBox="0 0 60 80" width="60" height="80">
      <rect x="6" y="10" width="48" height="60" fill="#2c2018"/>
      <rect x="6" y="22" width="48" height="2" fill="#3a2818"/>
      <rect x="6" y="34" width="48" height="2" fill="#3a2818"/>
      <rect x="6" y="46" width="48" height="2" fill="#3a2818"/>
      <rect x="20" y="14" width="6" height="6" fill="#5a3820"/>
      <rect x="32" y="14" width="6" height="6" fill="#5a3820"/>
      <rect x="42" y="14" width="6" height="6" fill="#5a3820"/>
      <rect x="10" y="26" width="6" height="6" fill="#5a3820"/>
      <rect x="20" y="38" width="6" height="6" fill="#5a3820"/>
      <rect x="42" y="50" width="6" height="6" fill="#5a3820"/>
    </svg>
  ` });

  // ===== BUILD =====
  const groundAgents = ['cortana','tony','gojo','surfer','c3po'];
  const upperAgents  = ['aang','batman','oak','spock'];
  const cryptsAgents = ['piccolo'];

  buildScene('iso-ground', groundLayout, groundAgents);
  buildScene('iso-upper',  upperLayout,  upperAgents);
  buildScene('iso-crypts', cryptsLayout, cryptsAgents);

  // ===== EXTERIOR ENTER =====
  document.getElementById('enterBtn').addEventListener('click', () => {
    document.getElementById('exterior').classList.add('hidden');
    setTimeout(() => {
      document.getElementById('interior').classList.add('shown');
      setTimeout(startWander, 800);
      setTimeout(triggerApprovalDemo, 7000);
    }, 200);
  });

  // ===== FLOOR SWITCHING =====
  document.querySelectorAll('.floors button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.floors button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      const f = b.dataset.floor;
      document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
      document.getElementById('scene-' + f).classList.add('active');
    });
  });

  // ===== WANDER =====
  function wanderAgent(el) {
    if (el.classList.contains('idle')) return;
    if (el.classList.contains('locked')) return; // demo overrides
    const id = el.dataset.id;
    const cfg = AGENTS[id];
    const hx = +el.dataset.homeX, hy = +el.dataset.homeY;
    // wander within 1 tile of home
    const nx = hx + (Math.random() < 0.5 ? -0.5 : 0.5) * Math.random();
    const ny = hy + (Math.random() < 0.5 ? -0.5 : 0.5) * Math.random();
    moveAgent(el, nx, ny, 2.2);
  }
  function startWander() {
    setInterval(() => {
      document.querySelectorAll('.agent').forEach(wanderAgent);
    }, 2600);
  }

  // ===== AGENT PANEL =====
  function openAgentPanel(id) {
    const cfg = AGENTS[id];
    const body = document.getElementById('panelBody');
    body.innerHTML = `
      <h2>${cfg.name}</h2>
      <div class="sub">${cfg.role}</div>
      <div class="stat">station <b>${cfg.station}</b></div>
      <div class="stat">floor <b>${cfg.floor}</b></div>
      <div class="stat">state <b>${cfg.state}</b></div>
      <div class="stat">model <b>${cfg.model}</b></div>
      <div class="stat">last <b>${cfg.state === 'idle' ? 'idle' : 'just now'}</b></div>

      <h3>RECENT</h3>
      <div class="row">opened task <span class="badge">phase 0</span></div>
      <div class="row">read source <span class="badge">cerebro-castle-ui.md</span></div>
      <div class="row">proposed memory <span class="badge violet">pending</span></div>
    `;
    document.getElementById('panel').classList.add('shown');
  }
  function openPanel(kind) {
    const body = document.getElementById('panelBody');
    if (kind === 'inbox') {
      body.innerHTML = `
        <h2>INBOX</h2>
        <div class="sub">3 items from Notion</div>
        <h3>NEW</h3>
        <div class="row">Crawl4AI README link <span class="badge">source</span></div>
        <div class="row">design ref: paper.design <span class="badge">visual</span></div>
        <div class="row">project brief: Bridgefour videos <span class="badge">brief</span></div>
      `;
    } else if (kind === 'tasks') {
      body.innerHTML = `
        <h2>TASKS</h2>
        <div class="sub">10 active</div>
        <div class="row">Phase 0 scaffolding <span class="badge">tony</span></div>
        <div class="row">License audit <span class="badge violet">oak</span></div>
        <div class="row">Castle UI mockup <span class="badge">gojo</span></div>
        <div class="row">Crawl4AI eval <span class="badge">surfer</span></div>
        <div class="row">Notion bridge spec <span class="badge">tony</span></div>
      `;
    } else if (kind === 'sources') {
      body.innerHTML = `
        <h2>SOURCES</h2>
        <div class="sub">Library</div>
        <div class="row">Claude Dungeon repo <span class="badge success">ingested</span></div>
        <div class="row">Pixel Agents repo <span class="badge success">ingested</span></div>
        <div class="row">cerebro-castle-ui.md <span class="badge success">parsed</span></div>
        <div class="row">OpenClaw landing <span class="badge">queued</span></div>
      `;
    } else if (kind === 'memory') {
      body.innerHTML = `
        <h2>MEMORY</h2>
        <div class="sub">Proposals + approved</div>
        <div class="row">Storage tier decision <span class="badge violet">proposed</span></div>
        <div class="row">Castle aesthetic locked <span class="badge success">approved</span></div>
        <div class="row">Wizard-of-Oz model <span class="badge success">approved</span></div>
      `;
    } else if (kind === 'settings') {
      body.innerHTML = `
        <h2>SETTINGS</h2>
        <div class="sub">Local config</div>
        <h3>STORAGE</h3>
        <div class="stat">brain <b>turso · libsql</b></div>
        <div class="stat">vault <b>google drive</b></div>
        <div class="stat">heavy <b>local · /CereBro</b></div>
        <h3>MODELS</h3>
        <div class="stat">local <b>ollama</b></div>
        <div class="stat">external <b>always confirm</b></div>
      `;
    }
    document.getElementById('panel').classList.add('shown');
  }
  function closePanel() {
    document.getElementById('panel').classList.remove('shown');
  }

  // ===== APPROVAL DEMO =====
  function triggerApprovalDemo() {
    // make sure we're on ground floor
    document.querySelectorAll('.floors button').forEach(x => x.classList.remove('active'));
    document.querySelector('.floors button[data-floor="ground"]').classList.add('active');
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    document.getElementById('scene-ground').classList.add('active');

    const tony = document.querySelector('#iso-ground .agent[data-id="tony"]');
    if (!tony) return;
    tony.classList.add('locked');

    // step 1: tony walks from forge (1,1) toward hub edge (3,3)
    moveAgent(tony, 3, 3, 2.2);
    setTimeout(() => moveAgent(tony, 4, 3.5, 1.6), 2300);
    setTimeout(() => {
      // show alert chip
      document.getElementById('alertChip').classList.remove('hidden');
      // update tony's bubble
      const b = tony.querySelector('.bubble');
      if (b) {
        b.classList.remove('warn'); b.classList.add('warn');
        b.textContent = 'requesting external call';
      }
    }, 4000);
  }

  function openApprovalPanel() {
    const body = document.getElementById('panelBody');
    body.innerHTML = `
      <h2>APPROVAL</h2>
      <div class="sub">cortana presents to the orb</div>
      <div class="approve-card">
        <div class="who">⚒ TONY STARK · external Claude Code call</div>
        <div class="ask">Tony needs frontier reasoning to draft Phase 1 scaffolding.</div>
        <div class="meta">
          <b>Context:</b> 4.2 KB (skill files + storage spec)<br>
          <b>Sensitive:</b> no<br>
          <b>Estimated cost:</b> ~3% of session<br>
          <b>Privacy:</b> no private memory included
        </div>
        <div class="actions">
          <button class="ok" onclick="approveCall()">APPROVE</button>
          <button class="no" onclick="denyCall()">DENY</button>
        </div>
      </div>
      <h3>WHY THIS GATE</h3>
      <div class="row">your locked rule <span class="badge warn">always confirm</span></div>
      <div class="row">no auto-batching <span class="badge warn">on</span></div>
      <div class="row">cost-aware <span class="badge success">on</span></div>
    `;
    document.getElementById('panel').classList.add('shown');
  }

  function approveCall() {
    document.getElementById('panel').classList.remove('shown');
    document.getElementById('alertChip').classList.add('hidden');
    const tony = document.querySelector('#iso-ground .agent[data-id="tony"]');
    const b = tony.querySelector('.bubble');
    if (b) {
      b.classList.remove('warn'); b.classList.add('live');
      b.textContent = 'approved · routing';
    }
    // walk back to forge
    setTimeout(() => moveAgent(tony, 1, 1, 2.4), 600);
    setTimeout(() => {
      tony.classList.remove('locked');
      if (b) {
        b.classList.remove('live'); b.classList.add('live');
        b.textContent = 'hammering away';
      }
      // burn tokens
      const fill = document.getElementById('tokenFill');
      const lbl = document.getElementById('tokenLabel');
      const newPct = 81;
      fill.style.width = newPct + '%';
      lbl.textContent = newPct + '%';
    }, 3200);
  }

  function denyCall() {
    document.getElementById('panel').classList.remove('shown');
    document.getElementById('alertChip').classList.add('hidden');
    const tony = document.querySelector('#iso-ground .agent[data-id="tony"]');
    const b = tony.querySelector('.bubble');
    if (b) {
      b.classList.remove('warn'); b.classList.add('warn');
      b.textContent = 'denied · waiting';
    }
    setTimeout(() => moveAgent(tony, 1, 1, 2.4), 600);
    setTimeout(() => {
      tony.classList.remove('locked');
    }, 3200);
  }

  // ===== TOKEN METER DRIFT =====
  let token = 84;
  setInterval(() => {
    token = Math.max(60, Math.min(95, token + (Math.random() - 0.5) * 1.4));
    const t = Math.round(token);
    document.getElementById('tokenFill').style.width = t + '%';
    document.getElementById('tokenLabel').textContent = t + '%';
  }, 4000);

  // ===== BUBBLE CYCLING =====
  const BUBBLES = {
    cortana: ['all stations ready', 'routing decision', 'awaiting orb'],
    surfer:  ['reading 3 docs', 'crawl4ai eval', 'summarizing'],
    gojo:    ['drafting castle ui', 'palette check', 'sprite review'],
    oak:     ['validating phase 0', 'cross-check', 'stamping'],
    piccolo: ['pruning logs', 'backup ok', 'crypt clean'],
    tony:    ['hammering away', 'spec ready', 'planning forge'],
  };
  setInterval(() => {
    document.querySelectorAll('.agent').forEach(a => {
      if (a.classList.contains('locked')) return;
      const id = a.dataset.id;
      const list = BUBBLES[id];
      if (!list) return;
      const b = a.querySelector('.bubble');
      if (b && !b.classList.contains('warn')) {
        b.textContent = list[Math.floor(Math.random() * list.length)];
      }
    });
  }, 6000);
</script>
